name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build packages (logger → types → core)
        run: |
          npm run build --workspace @xllmapi/logger
          npm run build --workspace @xllmapi/shared-types
          npm run build --workspace @xllmapi/core

      - name: Build apps (web, platform-api, node-cli)
        run: |
          npm run build --workspace @xllmapi/web
          npm run build --workspace @xllmapi/platform-api
          npm run build --workspace @xllmapi/node-cli

      - name: TypeScript check (platform-api)
        run: npx tsc -p apps/platform-api/tsconfig.json --noEmit

      - name: Build production image
        run: docker build -f infra/docker/platform-api.Dockerfile -t xllmapi-platform-api:ci .

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: xllmapi
          POSTGRES_PASSWORD: xllmapi
          POSTGRES_DB: xllmapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xllmapi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Apply migrations
        run: node apps/platform-api/dist/scripts/apply-postgres-migrations.js
        env:
          DATABASE_URL: postgresql://xllmapi:xllmapi@127.0.0.1:5432/xllmapi

      - name: Unit tests (core)
        run: npx tsx --test --test-force-exit --test-timeout 30000 packages/core/src/**/__tests__/*.test.ts

      - name: Unit tests (platform-api)
        run: npx tsx --test --test-force-exit --test-timeout 30000 apps/platform-api/src/tests/*.test.ts
        env:
          XLLMAPI_ENV: development
          XLLMAPI_SECRET_KEY: ci-test-secret
          XLLMAPI_DB_DRIVER: postgres
          DATABASE_URL: postgresql://xllmapi:xllmapi@127.0.0.1:5432/xllmapi
          REDIS_URL: redis://127.0.0.1:6379
          LOG_LEVEL: warn
          XLLMAPI_AUTH_PASSWORD_LOGIN_LIMIT_PER_MINUTE: 100
          XLLMAPI_AUTH_REQUEST_CODE_LIMIT_PER_MINUTE: 100
          XLLMAPI_AUTH_VERIFY_CODE_LIMIT_PER_MINUTE: 100
          XLLMAPI_CHAT_RATE_LIMIT_PER_MINUTE: 200

  e2e:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: xllmapi
          POSTGRES_PASSWORD: xllmapi
          POSTGRES_DB: xllmapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xllmapi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Apply migrations
        run: node apps/platform-api/dist/scripts/apply-postgres-migrations.js
        env:
          DATABASE_URL: postgresql://xllmapi:xllmapi@127.0.0.1:5432/xllmapi

      - name: E2E MVP flow
        run: npm run test:e2e:mvp
        env:
          XLLMAPI_SECRET_KEY: ci-test-secret
          DATABASE_URL: postgresql://xllmapi:xllmapi@127.0.0.1:5432/xllmapi
          REDIS_URL: redis://127.0.0.1:6379

      - name: E2E sharing flow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run test:e2e:sharing
        env:
          XLLMAPI_SECRET_KEY: ci-test-secret
          DATABASE_URL: postgresql://xllmapi:xllmapi@127.0.0.1:5432/xllmapi
          REDIS_URL: redis://127.0.0.1:6379

  container-smoke:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: xllmapi
          POSTGRES_PASSWORD: xllmapi
          POSTGRES_DB: xllmapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xllmapi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build --build-arg NODE_IMAGE=node:24-bookworm-slim --build-arg APT_MIRROR=deb.debian.org -f infra/docker/platform-api.Dockerfile -t xllmapi-platform-api:ci .

      - name: Apply migrations
        run: |
          docker run --rm --network host \
            -e XLLMAPI_ENV=production \
            -e XLLMAPI_SECRET_KEY=ci-test-secret \
            -e XLLMAPI_APP_BASE_URL=http://127.0.0.1:3000 \
            -e XLLMAPI_DB_DRIVER=postgres \
            -e DATABASE_URL=postgresql://xllmapi:xllmapi@127.0.0.1:5432/xllmapi \
            -e REDIS_URL=redis://127.0.0.1:6379 \
            -e XLLMAPI_CORS_ORIGINS=http://127.0.0.1:3000 \
            -e XLLMAPI_EMAIL_PROVIDER=mock \
            -e XLLMAPI_EMAIL_FROM=no-reply@example.test \
            xllmapi-platform-api:ci \
            node apps/platform-api/dist/scripts/apply-postgres-migrations.js

      - name: Start production container
        run: |
          docker run -d --rm --name xllmapi-platform-api-ci --network host \
            -e PORT=3000 \
            -e XLLMAPI_ENV=production \
            -e XLLMAPI_SECRET_KEY=ci-test-secret \
            -e XLLMAPI_RELEASE_ID=ci-smoke \
            -e XLLMAPI_APP_BASE_URL=http://127.0.0.1:3000 \
            -e XLLMAPI_DB_DRIVER=postgres \
            -e DATABASE_URL=postgresql://xllmapi:xllmapi@127.0.0.1:5432/xllmapi \
            -e REDIS_URL=redis://127.0.0.1:6379 \
            -e XLLMAPI_CORS_ORIGINS=http://127.0.0.1:3000 \
            -e XLLMAPI_EMAIL_PROVIDER=mock \
            -e XLLMAPI_EMAIL_FROM=no-reply@example.test \
            xllmapi-platform-api:ci

      - name: Wait for container startup
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:3000/healthz > /dev/null 2>&1; then
              echo "Container healthy after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Container logs (debug)
        if: always()
        run: docker logs xllmapi-platform-api-ci 2>&1 | tail -30 || true

      - name: Smoke probe container
        run: XLLMAPI_EXPECT_RELEASE_ID=ci-smoke bash scripts/release-smoke.sh

      - name: Stop production container
        if: always()
        run: docker rm -f xllmapi-platform-api-ci || true
