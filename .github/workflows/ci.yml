name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (shared-types → web → platform-api)
        run: npm run build

      - name: TypeScript check
        run: npx tsc -p apps/platform-api/tsconfig.json --noEmit

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: xllmapi
          POSTGRES_PASSWORD: xllmapi
          POSTGRES_DB: xllmapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xllmapi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Apply migrations
        run: node apps/platform-api/dist/scripts/apply-postgres-migrations.js
        env:
          DATABASE_URL: postgresql://xllmapi:xllmapi@127.0.0.1:5432/xllmapi

      - name: Unit tests
        run: npm run test:platform-api
        env:
          XLLMAPI_ENV: development
          XLLMAPI_SECRET_KEY: ci-test-secret
          XLLMAPI_DB_DRIVER: postgres
          DATABASE_URL: postgresql://xllmapi:xllmapi@127.0.0.1:5432/xllmapi
          REDIS_URL: redis://127.0.0.1:6379
