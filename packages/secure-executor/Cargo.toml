[package]
name = "secure-executor"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", features = ["async", "napi8"] }
napi-derive = "2"
aes-gcm = "0.10"
base64 = "0.22"
reqwest = { version = "0.12", features = ["stream", "rustls-tls", "json"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "macros"] }
futures-util = "0.3"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = true
