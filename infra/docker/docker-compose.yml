services:
  postgres:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/ghcr.io/cloudnative-pg/postgresql:17
    user: "0:0"
    environment:
      POSTGRES_USER: xllmapi
      POSTGRES_PASSWORD: xllmapi
      POSTGRES_DB: xllmapi
      PGDATA: /var/lib/postgresql/data/pgdata
    command: ["bash", "/start-postgres-cnpg.sh"]
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xllmapi -d xllmapi"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./start-postgres-cnpg.sh:/start-postgres-cnpg.sh:ro

  redis:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  platform-api:
    build:
      context: ../..
      dockerfile: infra/docker/platform-api.Dockerfile
      network: host
      args:
        NODE_IMAGE: ${XLLMAPI_NODE_IMAGE:-swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/node:24-bookworm-slim}
    environment:
      XLLMAPI_ENV: development
      XLLMAPI_SECRET_KEY: local-dev-secret
      XLLMAPI_DB_DRIVER: postgres
      DATABASE_URL: postgresql://xllmapi:xllmapi@postgres:5432/xllmapi
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
